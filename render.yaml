services:
  - type: web
    name: datacleanx
    env: python
    region: oregon
    plan: free
    # Install Python deps, then build the React frontend
    buildCommand: "pip install -r requirements.txt && cd frontend && npm install && npm run build"
    # Serve with gunicorn; Render injects $PORT automatically
    startCommand: "gunicorn --chdir backend app:app --bind 0.0.0.0:$PORT --workers 1 --timeout 120"
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
